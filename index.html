<h1>プライバシーポリシー</h1>
<p>嘘雑学トークは、ユーザーのプライバシーを尊重します。</p>
<h2>収集する情報</h2>
<ul>
<li>広告配信のための匿名の端末識別情報（Google AdMob）</li>
<li>単語入力データ（ランキング機能）</li>
</ul>
<h2>利用目的</h2>
<p>広告の最適化およびランキング機能の提供に使用します。</p>
<h2>第三者への提供</h2>
<p>Google AdMobの広告配信に使用されます。</p>
<h2>データの保存</h2>
<p>アプリ内のデータは端末内にのみ保存されます。</p>
<h2>お問い合わせ</h2>
<p>ご不明な点はApp Storeのサポートページよりお問い合わせください。</p>
